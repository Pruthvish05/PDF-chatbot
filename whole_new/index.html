<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SigmaDoxs | AI RAG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        .upload-zone { margin-top: 40px; padding: 60px; text-align: center; width: 500px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 style="font-size: 5rem; font-weight: 900; letter-spacing: -2px;">
            SIGMA<span class="neon-text">DOXS</span>
        </h1>
        <p style="color: var(--text-dim); margin-top: -10px;">The Ultimate RAG Engine for Academic Excellence</p>
        
        <div class="glass-card upload-zone">
            <h3 style="margin-bottom: 20px;">Deploy Knowledge Source</h3>
            <input type="file" id="pdfFile" accept=".pdf" style="display: none;">
            <button class="btn-primary" onclick="document.getElementById('pdfFile').click()">Select PDF</button>
            <p style="font-size: 12px; color: var(--text-dim); margin-top: 15px;">Cost: 5 Tokens per upload</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="api.js"></script>
    <script>
        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    localStorage.setItem('pending_data', evt.target.result);
                    localStorage.setItem('pending_name', file.name);
                    TokenManager.deduct(5);
                    window.location.href = 'processing.html';
                };
                reader.readAsDataURL(file);
            }
        });
        gsap.from(".hero h1", { opacity: 0, y: 30, duration: 1.5, ease: "power4.out" });
        gsap.from(".upload-zone", { opacity: 0, scale: 0.9, duration: 1, delay: 0.5 });
    </script>
</body>
</html>
