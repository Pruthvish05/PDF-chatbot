<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SigmaDoxs | Processing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .progress-container { width: 400px; height: 2px; background: #111; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .status-text { text-transform: uppercase; letter-spacing: 3px; font-size: 12px; color: var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-text" id="status">Initializing Vector Pipeline...</div>
        <div class="progress-container glass-card">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let progress = 0;
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');

        const interval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 2;
                bar.style.width = progress + '%';
            }
        }, 150);

        async function processUpload() {
            const base64 = localStorage.getItem('pending_data');
            const name = localStorage.getItem('pending_name');
            try {
                // Convert base64 data URL to blob
                const response = await fetch(base64);
                const blob = await response.blob();
                const file = new File([blob], name, { type: 'application/pdf' });
                
                const uploadRes = await SigmaAPI.uploadFile(file);
                if (uploadRes.status === 'success') {
                    clearInterval(interval);
                    bar.style.width = '100%';
                    status.innerText = "Indexing Complete";
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    throw new Error(`Upload failed: ${uploadRes.status}`);
                }
            } catch (err) {
                console.error("Upload error:", err);
                status.innerText = `Upload Failed: ${err.message}`;
                status.style.color = "red";
            }
        }
        processUpload();
    </script>
</body>
</html>
